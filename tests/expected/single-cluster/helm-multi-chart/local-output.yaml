      app: rancher-monitoring-upgrade
    name: rancher-monitoring-upgrade
    namespace: cattle-monitoring-system
  spec:
    template:
      metadata:
        labels:
          app: rancher-monitoring-upgrade
        name: rancher-monitoring-upgrade
